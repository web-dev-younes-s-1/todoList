<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            transition: all .5s !important;
        }

        #btn,
        #darkModeParent,
        #gearISparent {
            transition: all .5s;
            color: orange !important;
        }

        #btn:hover,
        #darkModeParent:hover,
        #gearISparent:hover {
            color: rgb(167, 110, 5) !important;

        }

        #field {
            height: fit-content;
            max-height: 350px;
            overflow-x: visible;
            overflow-y: auto;
            padding: 10px;
            scrollbar-width: none;
        }

        main {
            height: fit-content;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            gap: 10px;
        }

        body {
            background-color: #1b0044;
            margin: 0;
        }

        .taskesField {
            background-color: whitesmoke;

            height: fit-content;
        }

        .taskField {
            display: flex;
            position: relative;
            flex-grow: 1;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.325);
            transition: all .5s;
        }

        .edit {

            box-shadow: 0 0 10px rgba(246, 178, 52, 0.641);
            background-color: rgba(246, 178, 52, 0.641);

        }

        .edit:hover {

            box-shadow: 0 0 10px rgb(255, 185, 55);

        }

        .del {
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.415);
            background-color: rgba(255, 0, 0, 0.415);
        }

        .del:hover {
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.65);
        }

        .ceck {

            box-shadow: 0 0 10px rgba(29, 90, 29, 0.272);
            background-color: rgba(74, 233, 74, 0.272);

        }

        .ceck:hover {
            box-shadow: 0 0 10px rgba(34, 110, 34, 0.272);
            background-color: rgba(74, 233, 74, 0.272);

        }

        .cecked {
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.415);
            background-color: rgba(255, 0, 0, 0.415);

        }

        .cecked:hover {
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.65);

        }

        .edit,
        .del,
        .ceck,
        .cecked {
            cursor: pointer;
            border-radius: 10px;
            border: 0;
            padding: 5px;
            transition: all .5s;

        }


        .btnField {
            display: flex;
            gap: 5px;
            transition: all .5s;
        }

        header {
            width: 100%;
            height: fit-content;
            /* background-color: #522e91; */
            width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .btn {
            color: orange !important;
            font-size: 30px;
        }

        .taskesField {
            border-radius: 10px;
            overflow: hidden;
            padding: 5px 15px 10px 15px;
            background-color: whitesmoke;
            display: flex;
            flex-direction: column;
            gap: 10px;

        }

        i {
            pointer-events: none;
        }

        footer {
            display: flex;
            flex-direction: column;
            /* justify-content: center; */
            align-items: center;
            width: 100%;
        }

        .outSpace {
            width: 100%;
            height: 8px;
            border-radius: 10px;
            background-color: rgba(128, 128, 128, 0.377);
            transition: all .5s;
            overflow: hidden;
        }

        .insideSpace {
            width: 0%;
            height: 8px;
            border-radius: 10px;
            background-color: rgb(2, 103, 2);
            transition: all 2s;

        }

        .percent {

            display: flex;
            width: 100%;
            justify-content: space-between;
            margin-bottom: 1px;
        }

        .container {
            box-shadow: -10px 10px 10px rgba(255, 255, 255, 0.311);
            box-shadow: -10px 10px 10px rgba(134, 134, 134, 0.75);

            border-radius: 12px;
        }

        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 40px;
            height: 21px;
            background-color: #ccc;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        input[type="checkbox"]::before {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: 0.3s;
        }

        input[type="checkbox"]:checked {
            background-color: #4CAF50;
        }

        input[type="checkbox"]:checked::before {
            left: 22px;
        }

        .bottom_max {
            width: 100%;
            position: relative;
            display: flex;
            justify-content: end;
            align-items: center;
            margin-top: 10px;
            gap: 17px;
        }

        .bottom_max span {
            cursor: pointer;
        }

        .bottom_max .ar:hover,
        .bottom_max .en:hover {
            transform: translateY(-2px);
        }

        .settings,
        #darkModeParent {
            background-color: rgba(255, 255, 255, 0);
            border: none;
            cursor: pointer;
        }

        .up_header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 5px;

        }


        .header_status {
            display: flex;
            gap: 5px;
            /* margin-bottom: 5px; */
        }

        .header_status span {
            cursor: pointer;
            border: 1px black solid;
            padding: 1px 10px;
            margin-bottom: 5px;
            border-radius: 10px;
            background-color: rgba(0, 0, 0, 0.1);
            transition: all .5s;
        }

        #all {
            box-shadow: 0 0 10px black;
            background-color: rgba(0, 0, 0, 0.213);
        }

        .header_status span:hover {
            background-color: rgba(0, 0, 0, 0.213);
        }

        #gear,
        #darkMode {
            font-size: 18px;

        }

        .circle {
            font-size: 34px;
            position: absolute;
            right: -12px;
            pointer-events: none;
        }



        #clearAll {
            width: 100%;
            height: fit-content;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
        }

        #clearAll span {
            background-color: rgb(172, 79, 79);
            padding: 10px;
            cursor: pointer;
            border-radius: 10px;
        }

        .edetingInput {
            width: 70%;
            height: 15px;
            padding: 10px;
            position: relative;
            font-family: cursive, sans-serif;
            transform: translateX(-10px);
            outline: none;
        }

        @media (max-width: 540px) {
            header {
                width: 100%;
            }

            .container {
                width: 90%;
            }

            .btnField {
                flex-direction: column;
            }

            .task_title {
                margin: auto;
                max-width: 148px;
            }

            span,
            .percent {
                font-family: sans-serif !important;
            }

            .btnField {
                font-family: cursive !important;

            }
        }
    </style>
</head>

<body id="body"
    style="font-family: cursive; display: flex; justify-content: center; align-items: center; height: 100vh;">
    <div id="container" class="container">
        <section id="taskesField" class="taskesField">
            <header id="header">
                <div class="up_header">
                    <div>
                        <button onclick="darkMode()" id="darkModeParent"><i id="darkMode"
                                class="fa-solid fa-moon"></i></button>
                    </div>
                    <span id="mainTitle" style=" color: black; font-weight: 800; font-family: cursive  ">My
                        Tasks</span>
                    <button class="btn" id="btn"
                        style="width: fit-content; background: none; border: none; cursor: pointer;   ">
                        +
                    </button>
                </div>
                <div id="header_status" class="header_status">
                    <span id="all">All</span>
                    <span id="pending">Pending</span>
                    <span id="finished">Finished</span>
                </div>
            </header>
            <main id="field">

            </main>

            <footer>
                <div id="clearAll">
                    <span id="clearAllBtn">CLEAR ALL</span>
                </div>
                <div id="percent" class="percent">
                    <div id="rightPercent"><span id="numberOfTasks">0</span> <span id="textPercent">task still
                            remaining</span></div>
                    <span id="idPercent">0%</span>
                </div>
                <div id="outSpace" class="outSpace">
                    <div id="insideSpace" class="insideSpace">

                    </div>
                </div>
                <div class="bottom_max">
                    <span id="ar" class="ar">Ar</span>
                    <span id="en" class="en">En</span>
                    <span id="circle" class="circle"><i class="fa-regular fa-circle"></i></span>
                </div>

            </footer>

        </section>
    </div>

    <script>
        const btnNode = document.getElementById("btn")
        const fieldNode = document.getElementById("field")
        const trashIcon = '<i class="fa-regular fa-trash-can"></i>'
        const editIcon = '<i class="fa-regular fa-pen-to-square"></i>'
        const checkIcon = '<i class="fa-solid fa-check"></i>'
        const Xicon = '<i class="fa-solid fa-x"></i>'
        const gear = document.getElementById("gear")
        const gearISparent = document.getElementById("gearISparent")
        const moonButton = document.getElementById("darkModeParent")
        const tasks = document.querySelectorAll(".taskField")
        const moonIcon = document.getElementById("darkMode")
        const percentDiv = document.getElementById("percent")
        const evrySpanBtn = document.querySelectorAll("span, button")
        const evrySpan = document.querySelectorAll("span")
        const mainBG = document.getElementById("taskesField")
        let focusBGC = "rgba(0, 0, 0, 0.213)"
        let focusBoxShadow = "0 0 5px black"
        let UnfocusBGC = "rgba(0, 0, 0, 0.1)"
        let UnfocusBoxShadow = "none"
        let colorX = 'whitesmoke'
        let mode = false
        let parameterField = false
        let saved = localStorage.getItem('listOfTasks')
        const allBtn = document.getElementById("all")
        const pendingBtn = document.getElementById("pending")
        const finishedBtn = document.getElementById("finished")
        let AllPendingFinishedObj = {
            all: true,
            pending: false,
            finished: false
        }
        let mainObj = {
            "id0": {
                title: 'Add a task!',
                status: false,

            },
        }
        if (saved) {
            mainObj = JSON.parse(saved)
        }



        for (let obj in mainObj) {
            let thisTitle = mainObj[obj].title
            let thisStatus = mainObj[obj].status

            let newSectionNode = document.createElement("section")
            newSectionNode.setAttribute('class', 'taskField')
            newSectionNode.setAttribute('id', obj)

            let newSpanNode = document.createElement("span")
            let theTaskTitle = document.createTextNode(thisTitle)
            newSpanNode.setAttribute('class', 'task_title')
            newSpanNode.appendChild(theTaskTitle)

            let newdivNode = document.createElement("div")
            newdivNode.setAttribute("class", 'btnField')
            let btn1Node = document.createElement("button")
            btn1Node.setAttribute("class", 'edit')
            let btn2Node = document.createElement("button")

            if (thisStatus) {
                btn2Node.setAttribute("class", 'cecked')
                btn2Node.innerHTML = Xicon
                newSectionNode.style.backgroundColor = 'rgba(119, 245, 119, 0.24)'


            } else {
                btn2Node.setAttribute("class", 'ceck')
                btn2Node.innerHTML = checkIcon

            }
            let btn3Node = document.createElement("button")
            btn3Node.setAttribute("class", 'del')


            btn1Node.innerHTML = editIcon
            btn3Node.innerHTML = trashIcon

            newdivNode.appendChild(btn1Node)
            newdivNode.appendChild(btn2Node)
            newdivNode.appendChild(btn3Node)

            newSectionNode.appendChild(newSpanNode)
            newSectionNode.appendChild(newdivNode)

            fieldNode.prepend(newSectionNode)
            updateTape()
        }



        function addToLocalStorage() {
            localStorage.setItem('listOfTasks', JSON.stringify(mainObj))
        }

        function addObjec(id, title) {
            mainObj[id] = {
                title: title,
                status: false,
            }

        }

        function refrechTitle(id, newTitle) {
            mainObj[id].title = newTitle
        }

        mode = JSON.parse(localStorage.getItem("mode"))
        if (mode) {
            // allBtn.style.backgroundColor = "rgba(255, 255, 255, 0.229)"
            // allBtn.style.boxShadow = "0 0 10px white"
            // focusBGC = "rgba(255, 255, 255, 0.229)"
            // focusBoxShadow = "0 0 10px white"
            ResetDarkMode()

        }


        function refrechStatus(id) {
            if (mainObj[id].status === true) {
                mainObj[id].status = false
            } else {
                mainObj[id].status = true
            }

        }

        function delObject(id) {
            delete mainObj[id]
        }

        function updateTape() {
            let falseObjects = 0
            let trueObjects = 0
            for (let obj in mainObj) {
                if (mainObj[obj].status) {
                    trueObjects++
                } else {
                    falseObjects++
                }


            }
            document.getElementById("numberOfTasks").textContent = falseObjects
            let percent = (trueObjects * 100) / (trueObjects + falseObjects)
            let numberFieldNode = document.getElementById("idPercent")
            document.getElementById("insideSpace").style.width = `${percent.toFixed(0)}%`
            if (Object.keys(mainObj).length === 0) {
                numberFieldNode.innerHTML = "0%"

            } else {

                numberFieldNode.innerHTML = percent.toFixed(0) + "%"
            }
        }

        newCount = JSON.parse(localStorage.getItem("count"))
        let count = newCount || 1

        btnNode.addEventListener("click", function () {

            let task = prompt('Enter a taske from here!', '')
            if (!task) {
                alert("Please enter a task")
                return
            }
            let id = 'id' + count++
            localStorage.setItem("count", JSON.stringify(count))

            let newSectionNode = document.createElement("section")
            newSectionNode.setAttribute('class', 'taskField')
            newSectionNode.setAttribute('id', id)

            let newSpanNode = document.createElement("span")
            let theTaskTitle = document.createTextNode(task)
            newSpanNode.setAttribute('class', 'task_title')
            newSpanNode.appendChild(theTaskTitle)

            let newdivNode = document.createElement("div")
            newdivNode.setAttribute("class", 'btnField')
            let btn1Node = document.createElement("button")
            btn1Node.setAttribute("class", 'edit')
            let btn2Node = document.createElement("button")
            btn2Node.setAttribute("class", 'ceck')
            let btn3Node = document.createElement("button")
            btn3Node.setAttribute("class", 'del')


            btn1Node.innerHTML = editIcon
            btn2Node.innerHTML = checkIcon
            btn3Node.innerHTML = trashIcon

            newdivNode.appendChild(btn1Node)
            newdivNode.appendChild(btn2Node)
            newdivNode.appendChild(btn3Node)
            newSectionNode.appendChild(newSpanNode)
            newSectionNode.appendChild(newdivNode)

            fieldNode.prepend(newSectionNode)
            addObjec(id, task)
            updateTape()
            addToLocalStorage()

            mode = JSON.parse(localStorage.getItem("mode"))
            if (mode) {
                ResetDarkMode()
            }

        })

        document.addEventListener('click', function (e) {
            let thisObj = e.target
            if (thisObj.classList.contains("del")) {
                let parent = thisObj.closest('.taskField')
                let parentId = parent.id
                parent.remove()
                delObject(parentId)
                addToLocalStorage()
                updateTape()
            }
        })


        document.addEventListener('click', function (e) {
            let thisObj = e.target
            let parent = e.target.closest(".taskField")
            if (thisObj.classList.contains("cecked")) {
                let iNode = thisObj.firstChild
                thisObj.removeChild(iNode)
                let newInode = document.createElement('i')
                newInode.setAttribute("class", 'fa-solid fa-check')
                thisObj.removeAttribute("class")
                thisObj.setAttribute("class", "ceck")
                thisObj.appendChild(newInode)
                parent.style.backgroundColor = colorX
                refrechStatus(parent.id)
                updateTape()
                addToLocalStorage()

            } else if (thisObj.classList.contains("ceck")) {
                let iNode = thisObj.firstChild
                thisObj.removeChild(iNode)
                let newInode = document.createElement('i')
                newInode.setAttribute("class", 'fa-solid fa-x')
                thisObj.removeAttribute("class")
                thisObj.setAttribute("class", "cecked")
                thisObj.appendChild(newInode)
                parent.style.backgroundColor = 'rgba(119, 245, 119, 0.24)'
                refrechStatus(parent.id)
                updateTape()
                addToLocalStorage()
            }
        })

        document.addEventListener('click', function (e) {
            let thisObj = e.target
            let parent = thisObj.closest(".taskField")
            if (thisObj.classList.contains("edit")) {
                const titleField = e.target.closest(".taskField").querySelector(".task_title")
                titleField.style.display = 'none'
                const newInputField = document.createElement("input")
                newInputField.setAttribute("class", 'edetingInput')
                newInputField.setAttribute("placeholder", 'Enter The New Title...')
                parent.prepend(newInputField)
                newInputField.focus()
                thisObj.style.display = 'none'
                newInputField.value = titleField.textContent

            }


        })


        function darkMode() {
            const moonButton = document.getElementById("darkModeParent")
            const tasks = document.querySelectorAll(".taskField")
            const moonIcon = document.getElementById("darkMode")
            const percentDiv = document.getElementById("percent")
            const evrySpanBtn = document.querySelectorAll("span, button")
            const evrySpan = document.querySelectorAll("span")
            const mainBG = document.getElementById("taskesField")
            if (mode) {
                mode = false

                evrySpanBtn.forEach(element => {
                    element.style.color = ""
                });
                evrySpan.forEach(element => {
                    element.style.textShadow = ""
                });
                mainBG.style.backgroundImage = 'none'
                mainBG.style.backgroundColor = 'whitesmoke'

                percentDiv.style.color = ''
                tasks.forEach(task => {
                    if (mainObj[task.id].status === false) {
                        task.style.backgroundColor = "whitesmoke"
                    }
                    task.style.boxShadow = '0 0 10px rgba(0, 0, 0, 0.325)'
                });
                colorX = 'whitesmoke'
                focusBGC = "rgba(0, 0, 0, 0.213)"
                focusBoxShadow = "0 0 10px black"
                UnfocusBGC = "rgba(0, 0, 0, 0.1)"
                UnfocusBoxShadow = "none"

            } else {
                mode = true

                evrySpanBtn.forEach(element => {
                    element.style.color = "white"
                });

                evrySpan.forEach(element => {
                    element.style.textShadow = "0 0 5px white"
                });

                tasks.forEach(task => {
                    if (mainObj[task.id].status === false) {
                        task.style.backgroundColor = "#223755a2"
                    }
                    task.style.boxShadow = '0 0 10px rgba(245, 245, 245, 0.303)'
                });


                percentDiv.style.color = '#ffffff'
                mainBG.style.backgroundImage = "linear-gradient(to top right,#3f3f4e, #252630)"
                colorX = '#223755a2'
                focusBGC = "rgba(255, 255, 255, 0.229)"
                focusBoxShadow = "0 0 10px white"
                UnfocusBGC = "rgba(0, 0, 0, 0.1)"
                UnfocusBoxShadow = "none"
            }
            localStorage.setItem("mode", JSON.stringify(mode))


        }
        function ResetDarkMode() {
            const moonButton = document.getElementById("darkModeParent")
            const tasks = document.querySelectorAll(".taskField")
            const moonIcon = document.getElementById("darkMode")
            const percentDiv = document.getElementById("percent")
            const evrySpanBtn = document.querySelectorAll("span, button")
            const evrySpan = document.querySelectorAll("span")
            const mainBG = document.getElementById("taskesField")


            evrySpanBtn.forEach(element => {
                element.style.color = "white"
            });

            evrySpan.forEach(element => {
                element.style.textShadow = "0 0 5px white"
            });

            tasks.forEach(task => {
                if (mainObj[task.id].status === false) {
                    task.style.backgroundColor = "#223755a2"
                }
                task.style.boxShadow = '0 0 10px rgba(245, 245, 245, 0.303)'
            });


            percentDiv.style.color = '#ffffff'
            mainBG.style.backgroundImage = "linear-gradient(to top right,#3f3f4e, #252630)"
            colorX = '#223755a2'
        }

        const ar = document.getElementById("ar")
        const en = document.getElementById("en")
        const circle = document.getElementById("circle")
        en.addEventListener("click", function () {
            circle.style.right = '-12px'
        })
        ar.addEventListener("click", function () {
            circle.style.right = '24px'

        })

        const clearAllBtn = document.getElementById("clearAllBtn")
        clearAllBtn.addEventListener("click", function () {
            let warn = confirm('Are you sure you want to delete all of your tasks?')
            if (!warn) {
                return
            }
            mainObj = {}
            addToLocalStorage()
            location.reload()
            localStorage.setItem("count", JSON.stringify(0))

        })


        document.addEventListener("focusout", function (e) {
            const thisObj = e.target
            if (e.target.className === 'edetingInput') {
                const section = thisObj.closest(".taskField")
                const editIcon = section.querySelector(".edit")
                const title = section.querySelector(".task_title")
                const input = section.querySelector(".edetingInput")


                editIcon.style.display = 'inherit'
                input.style.display = 'none'
                title.style.display = 'inherit'
            }
        })
        document.addEventListener("keydown", function (e) {
            if (e.key === 'Enter') {
                const thisObj = e.target
                if (e.target.className === 'edetingInput') {
                    const section = thisObj.closest(".taskField")
                    const editIcon = section.querySelector(".edit")
                    const title = section.querySelector(".task_title")
                    const input = section.querySelector(".edetingInput")


                    editIcon.style.display = 'inherit'
                    input.style.display = 'none'
                    title.style.display = 'inherit'
                    title.textContent = input.value
                    refrechTitle(section.id, title.textContent)
                    addToLocalStorage()

                }

            }
        })




        allBtn.addEventListener("click", function () {
            AllPendingFinishedObj.all = true
            AllPendingFinishedObj.pending = false
            AllPendingFinishedObj.finished = false
            console.log(AllPendingFinishedObj);

        })
        pendingBtn.addEventListener("click", function () {
            AllPendingFinishedObj.all = false
            AllPendingFinishedObj.pending = true
            AllPendingFinishedObj.finished = false
            console.log(AllPendingFinishedObj);
        })
        finishedBtn.addEventListener("click", function () {
            AllPendingFinishedObj.all = false
            AllPendingFinishedObj.pending = false
            AllPendingFinishedObj.finished = true
            console.log(AllPendingFinishedObj);
        })







    </script>
    <script src="https://kit.fontawesome.com/3c5a867fce.js" crossorigin="anonymous"></script>
</body>

</html>
