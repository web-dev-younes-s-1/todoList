<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #btn {
            transition: all .5s;
        }

        #btn:hover {
            color: rgb(167, 110, 5) !important;

        }
        #field{
            height: fit-content;
            max-height: 400px;
            overflow-x: visible;
            overflow-y: auto;
            padding: 10px;


            /* scrollbar-width: none; */
        }

        main {
            height: fit-content;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            gap: 10px;
        }

        body {
            background-color: #1b0044;
        }

        .taskesField {
            background-color: whitesmoke;
            height: fit-content;
        }

        .taskField {
            display: flex;
            flex-direction: row;
            flex-grow: 1;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.325);
            transition: all .5s;
        }

        .edit {

            box-shadow: 0 0 10px rgba(246, 178, 52, 0.641);
            background-color: rgba(246, 178, 52, 0.641);

        }

        .edit:hover {

            box-shadow: 0 0 10px rgb(255, 185, 55);

        }

        .del {
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.415);
            background-color: rgba(255, 0, 0, 0.415);
        }

        .del:hover {
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.65);
        }

        .ceck {
            
            box-shadow: 0 0 10px rgba(29, 90, 29, 0.272);
            background-color: rgba(74, 233, 74, 0.272);

        }

        .ceck:hover {
            box-shadow: 0 0 10px rgba(34, 110, 34, 0.272);
            background-color: rgba(74, 233, 74, 0.272);

        }

        .cecked {
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.415);
            background-color: rgba(255, 0, 0, 0.415);

        }

        .cecked:hover {
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.65);

        }

        .edit,
        .del,
        .ceck,
        .cecked {
            cursor: pointer;
            border-radius: 10px;
            border: 0;
            padding: 5px;
            transition: all .5s;

        }


        .btnField {
            display: flex;
            gap: 5px;
            transition: all .5s;
        }

        header {
            width: 100%;
            height: 25px;
            /* background-color: #522e91; */
            width: 500px;
            padding: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn {
            color: orange;
            font-size: 30px;
        }

        .taskesField {
            border-radius: 10px;
            overflow: hidden;
            padding: 15px 10px;
            background-color: whitesmoke;
            display: flex;
            flex-direction: column;
            gap: 10px;

        }

        i {
            pointer-events: none;
        }

        footer {
            display: flex;
            flex-direction: column;
            /* justify-content: center; */
            align-items: center;
            width: 100%;
        }

        .outSpace {
            width: 100%;
            height: 8px;
            border-radius: 10px;
            background-color: rgba(128, 128, 128, 0.377);
            transition: all .5s;
            overflow: hidden;
        }

        .insideSpace {
            width: 0%;
            height: 8px;
            border-radius: 10px;
            background-color: rgb(2, 103, 2);
            transition: all 2s;

        }

        .percent {

            display: flex;
            width: 100%;
            justify-content: space-between;
            margin-bottom: 1px;
        }
        .container{
            box-shadow: -10px 10px 10px rgba(255, 255, 255, 0.311);
            border-radius: 12px;
        }

        @media (max-width: 540px){
            header{
                width: 100%;
            }
            .container{
                width: 90%;
            }
            .btnField{
                flex-direction: column;
            }
            .task_title{
                margin: auto;
                max-width: 148px;
            }
            span, .percent{
                font-family: sans-serif !important;
            }
            .btnField{
                font-family:cursive !important;
            
            }
        }
    </style>
</head>

<body style="font-family: cursive; display: flex; justify-content: center; align-items: center; height: 100vh;">
    <div id="container" class="container">
        <section id="taskesField" class="taskesField">
            <header>
                <span style="margin: auto; color: black; font-weight: 800; font-family: cursive  ">My Tasks</span>
                <button class="btn" id="btn"
                    style="margin-right: 10px; width: fit-content; background: none; border: none; cursor: pointer;   ">+</button>
            </header>
            <main id="field">

            </main>
            <footer>
                <div class="percent">
                    <div><span id="numberOfTasks">0</span> task still remaining</div>
                    <span id="idPercent">0%</span>
                </div>
                <div id="outSpace" class="outSpace">
                    <div id="insideSpace" class="insideSpace">

                    </div>
                </div>
            </footer>
        </section>
    </div>

    <script>
        const btnNode = document.getElementById("btn")
        const fieldNode = document.getElementById("field")
        const trashIcon = '<i class="fa-regular fa-trash-can"></i>'
        const editIcon = '<i class="fa-regular fa-pen-to-square"></i>'
        const checkIcon = '<i class="fa-solid fa-check"></i>'
        const Xicon = '<i class="fa-solid fa-x"></i>'
        let saved = localStorage.getItem('listOfTasks')
        let mainObj = {
            "id0": {
                title: 'Add a task!',
                status: false,

            },
        }
        if (saved) {
            mainObj = JSON.parse(saved)
        }

        for (let obj in mainObj) {
            let thisTitle = mainObj[obj].title
            let thisStatus = mainObj[obj].status

            let newSectionNode = document.createElement("section")
            newSectionNode.setAttribute('class', 'taskField')
            newSectionNode.setAttribute('id', obj)

            let newSpanNode = document.createElement("span")
            let theTaskTitle = document.createTextNode(thisTitle)
            newSpanNode.setAttribute('class', 'task_title')
            newSpanNode.appendChild(theTaskTitle)

            let newdivNode = document.createElement("div")
            newdivNode.setAttribute("class", 'btnField')
            let btn1Node = document.createElement("button")
            btn1Node.setAttribute("class", 'edit')
            let btn2Node = document.createElement("button")

            if (thisStatus) {
                btn2Node.setAttribute("class", 'ceck')
                btn2Node.innerHTML = checkIcon
                newSectionNode.style.backgroundColor = 'rgba(119, 245, 119, 0.24)'
                

            } else {
                btn2Node.setAttribute("class", 'cecked')
                btn2Node.innerHTML = Xicon

            }
            let btn3Node = document.createElement("button")
            btn3Node.setAttribute("class", 'del')


            btn1Node.innerHTML = editIcon
            btn3Node.innerHTML = trashIcon

            newdivNode.appendChild(btn1Node)
            newdivNode.appendChild(btn2Node)
            newdivNode.appendChild(btn3Node)

            newSectionNode.appendChild(newSpanNode)
            newSectionNode.appendChild(newdivNode)

            fieldNode.appendChild(newSectionNode)
            updateTape()
        }


        function addToLocalStorage() {
            localStorage.setItem('listOfTasks', JSON.stringify(mainObj))
        }

        function addObjec(id, title) {
            mainObj[id] = {
                title: title,
                status: false,
            }

        }

        function refrechTitle(id, newTitle) {
            mainObj[id].title = newTitle
        }


        function refrechStatus(id) {
            if (mainObj[id].status === true) {
                mainObj[id].status = false
            } else {
                mainObj[id].status = true
            }

        }

        function delObject(id) {
            delete mainObj[id]
        }

        function updateTape() {
            let falseObjects = 0
            let trueObjects = 0
            for (let obj in mainObj) {
                if (mainObj[obj].status) {
                    trueObjects++
                } else {
                    falseObjects++
                }

                
            }
            document.getElementById("numberOfTasks").textContent = falseObjects
            let percent = (trueObjects * 100) / (trueObjects + falseObjects)
            let numberFieldNode = document.getElementById("idPercent")
            document.getElementById("insideSpace").style.width = `${percent.toFixed(0)}%`
            if (Object.keys(mainObj).length === 0){
                numberFieldNode.innerHTML = "0%"

            }else{

                numberFieldNode.innerHTML = percent.toFixed(0) +"%"
            }
        }

        newCount = JSON.parse(localStorage.getItem("count"))
        let count = newCount || 1

        btnNode.addEventListener("click", function () {

            let task = prompt('Enter a taske from here!', '')
            if (!task) {
                alert("Please enter a task")
                return
            }
            let id = 'id' + count++
            localStorage.setItem("count", JSON.stringify(count))

            let newSectionNode = document.createElement("section")
            newSectionNode.setAttribute('class', 'taskField')
            newSectionNode.setAttribute('id', id)

            let newSpanNode = document.createElement("span")
            let theTaskTitle = document.createTextNode(task)
            newSpanNode.setAttribute('class', 'task_title')
            newSpanNode.appendChild(theTaskTitle)

            let newdivNode = document.createElement("div")
            newdivNode.setAttribute("class", 'btnField')
            let btn1Node = document.createElement("button")
            btn1Node.setAttribute("class", 'edit')
            let btn2Node = document.createElement("button")
            btn2Node.setAttribute("class", 'cecked')
            let btn3Node = document.createElement("button")
            btn3Node.setAttribute("class", 'del')


            btn1Node.innerHTML = editIcon
            btn2Node.innerHTML = Xicon
            btn3Node.innerHTML = trashIcon

            newdivNode.appendChild(btn1Node)
            newdivNode.appendChild(btn2Node)
            newdivNode.appendChild(btn3Node)

            newSectionNode.appendChild(newSpanNode)
            newSectionNode.appendChild(newdivNode)

            fieldNode.appendChild(newSectionNode)
            addObjec(id, task)
            updateTape()
            addToLocalStorage()

        })

        document.addEventListener('click', function (e) {
            let thisObj = e.target
            if (thisObj.classList.contains("del")) {
                let parent = thisObj.closest('.taskField')
                let parentId = parent.id
                parent.remove()
                delObject(parentId)
                addToLocalStorage()
                updateTape()
            }
        })


        document.addEventListener('click', function (e) {
            let thisObj = e.target
            let parent = e.target.closest(".taskField")
            if (thisObj.classList.contains("ceck")) {
                let iNode = thisObj.firstChild
                thisObj.removeChild(iNode)
                let newInode = document.createElement('i')
                newInode.setAttribute("class", 'fa-solid fa-x')
                thisObj.removeAttribute("class")
                thisObj.setAttribute("class", "cecked")
                thisObj.appendChild(newInode)
                parent.style.backgroundColor = 'whitesmoke'
                refrechStatus(parent.id)
                updateTape()
                addToLocalStorage()
                
            } else if (thisObj.classList.contains("cecked")) {
                let iNode = thisObj.firstChild
                thisObj.removeChild(iNode)
                let newInode = document.createElement('i')
                newInode.setAttribute("class", 'fa-solid fa-check')
                thisObj.removeAttribute("class")
                thisObj.setAttribute("class", "ceck")
                thisObj.appendChild(newInode)
                parent.style.backgroundColor = 'rgba(119, 245, 119, 0.24)'
                refrechStatus(parent.id)
                updateTape()
                addToLocalStorage()
            }
        })

        document.addEventListener('click', function (e) {
            let thisObj = e.target
            let parent = thisObj.closest(".taskField")
            if (thisObj.classList.contains("edit")) {
                let spanBrother = e.target.closest(".taskField").querySelector(".task_title")
                let newTitle = prompt("enter the new task is title", spanBrother.textContent) || spanBrother.textContent
                spanBrother.textContent = newTitle
                refrechTitle(parent.id, newTitle)
                addToLocalStorage()
            }
            

        })



    </script>
    <script src="https://kit.fontawesome.com/3c5a867fce.js" crossorigin="anonymous"></script>
</body>

</html>
